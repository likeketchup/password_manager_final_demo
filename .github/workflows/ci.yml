name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          MYSQL_PORT=3306
          MYSQL_PASSWORD=supersecretpw
          MYSQL_DATABASE=password_manager
          MYSQL_USER=user
          BUILD_TARGET=backend-php-server
          EOF

      - name: Build and start Docker containers
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          for i in {1..60}; do
            # Check if MySQL is accepting connections
            if docker compose exec -T backend-mysql-database mysql -u user -psupersecretpw -e "SELECT 1" > /dev/null 2>&1; then
              echo "MySQL is ready"
              # Also verify the web server is responding
              if docker compose exec -T router curl -k https://localhost:443 > /dev/null 2>&1; then
                echo "All services are ready"
                exit 0
              fi
            fi
            echo "Waiting for services... ($i/60)"
            sleep 2
          done
          echo "Services failed to start"
          docker compose logs
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v

      - name: Cleanup
        if: always()
        run: docker compose down
